<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Tracker</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f3f4f6; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { color: #1e293b; margin-top: 0; font-size: 20px; text-align: center; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 30px; }
        input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
        button:hover { background: #2563eb; }

        .result-box { border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; color: #64748b; font-size: 14px; }
        .info-val { color: #1e293b; font-weight: 600; }

        .timeline { display: flex; justify-content: space-between; margin: 30px 0; position: relative; }
        .timeline::before { content: ''; position: absolute; height: 3px; background: #e2e8f0; width: 85%; top: 50%; left: 7%; z-index: 1; }
        .dot { width: 30px; height: 30px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; color: white; font-weight: bold; z-index: 2; transition: 0.3s; }
        .dot.active { background: #10b981; }
        .labels { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="card">
    <h2>Order Tracking</h2>
    <div class="search-box">
        <input type="text" id="idInput" placeholder="Enter Order ID">
        <button onclick="window.runTracking()">Track</button>
    </div>

    <div id="displayArea" style="display:none;">
        <div class="result-box">
            <div class="info-row"><span>Client:</span> <span class="info-val" id="cName">...</span></div>
            <div class="info-row"><span>Order ID:</span> <span class="info-val" id="oID">...</span></div>
            <div class="info-row"><span>Type:</span> <span class="info-val" id="type">...</span></div>
            <div class="info-row"><span>Quantity:</span> <span class="info-val" id="qty">...</span></div>
            <div class="info-row"><span>Color:</span> <span class="info-val" id="color">...</span></div>
            <div class="info-row"><span>Brand:</span> <span class="info-val" id="brand">...</span></div>
            <div class="info-row"><span>Dimensions:</span> <span class="info-val" id="dimensions">...</span></div>
            <div class="info-row"><span>Created:</span> <span class="info-val" id="created">...</span></div>
        </div>
        
        <div class="timeline">
            <div class="dot" id="d1">1</div>
            <div class="dot" id="d2">2</div>
            <div class="dot" id="d3">3</div>
        </div>
        <div class="labels">
            <span>Pending</span><span>Progress</span><span>Finished</span>
        </div>
        <p id="statusMsg" style="text-align:center; font-weight:600; color:#334155; margin-top:20px;"></p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    window.runTracking = async function() {
        const orderId = document.getElementById('idInput').value.trim();
        const display = document.getElementById('displayArea');
        const msg = document.getElementById('statusMsg');
        
        if (!orderId) return alert("Please enter an ID");

        const supabase = window.supabase.createClient(
            "https://svkethyotokfbhejgtgb.supabase.co",
            "sb_publishable_vwXSA09ih-8pX1IY38UKZg_VZcoQJ7U"
        );

        display.style.display = 'block';
        msg.innerHTML = "Searching...";

        // Query including 'created_at'
        const { data, error } = await supabase
            .from('Tracking')
            .select('current_status, client_name, type, quantity, color, brand, dimensions, created_at')
            .eq('tracking_id', orderId)
            .single();

        if (error) return alert("Error: " + error.message);

        // Fill Data
        document.getElementById('cName').innerText = data.client_name || "N/A";
        document.getElementById('oID').innerText = orderId;
        document.getElementById('type').innerText = data.type || "N/A";
        document.getElementById('qty').innerText = data.quantity || "0";
        document.getElementById('color').innerText = data.color || "N/A";
        document.getElementById('brand').innerText = data.brand || "N/A";
        document.getElementById('dimensions').innerText = data.dimensions || "N/A";
        
        // Format and Fill Date
        const date = new Date(data.created_at).toLocaleDateString();
        document.getElementById('created').innerText = data.created_at ? date : "N/A";
        
        // Reset and Set Status
        document.getElementById('d1').className = 'dot';
        document.getElementById('d2').className = 'dot';
        document.getElementById('d3').className = 'dot';

        const s = data.current_status;
        if (s >= 1) document.getElementById('d1').classList.add('active');
        if (s >= 2) document.getElementById('d2').classList.add('active');
        if (s >= 3) document.getElementById('d3').classList.add('active');
        
        const map = {1: "Pending", 2: "In Progress", 3: "Finished"};
        msg.innerHTML = map[s] || "Status Code: " + s;
    };
</script>
</body>
</html>
